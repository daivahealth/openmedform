services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmedform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-openmedform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmedform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openmedform}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openmedform}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3100
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-}
      AI_CLAUDE_API_KEY: ${AI_CLAUDE_API_KEY:-}
      AI_CLAUDE_MODEL: ${AI_CLAUDE_MODEL:-}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:-}
      AI_OPENAI_MODEL: ${AI_OPENAI_MODEL:-}
      AI_MINIMAX_API_KEY: ${AI_MINIMAX_API_KEY:-}
      AI_MINIMAX_MODEL: ${AI_MINIMAX_MODEL:-}
      AI_KIMI_API_KEY: ${AI_KIMI_API_KEY:-}
      AI_KIMI_MODEL: ${AI_KIMI_MODEL:-}
      AI_OLLAMA_BASE_URL: ${AI_OLLAMA_BASE_URL:-}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
